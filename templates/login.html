<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fake News Detector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 16px; width: 420px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .logo { text-align: center; margin-bottom: 24px; }
        .logo h1 { font-size: 22px; color: #1a1a1a; }
        .logo p { font-size: 13px; color: #666; margin-top: 4px; }
        .step { display: none; }
        .step.active { display: block; }
        label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
        input { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; outline: none; margin-bottom: 16px; }
        input:focus { border-color: #4f46e5; }
        button { width: 100%; padding: 13px; background: #4f46e5; color: white; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; }
        button:hover { background: #4338ca; }
        .msg { font-size: 13px; margin-top: 12px; text-align: center; }
        .msg.error { color: #dc2626; }
        .msg.success { color: #16a34a; }
        .back { font-size: 13px; color: #4f46e5; cursor: pointer; text-align: center; margin-top: 12px; }
        .otp-inputs { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; }
        .otp-inputs input { width: 48px; height: 52px; text-align: center; font-size: 20px; font-weight: bold; padding: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Fake News Detector</h1>
            <p>Login to analyse news articles</p>
        </div>

        <!-- Step 1: Email -->
        <div class="step active" id="step1">
            <label>Enter your email address</label>
            <input type="email" id="email" placeholder="you@example.com" />
            <button onclick="sendOTP()">Send OTP</button>
            <p class="msg" id="msg1"></p>
        </div>

        <!-- Step 2: OTP -->
        <div class="step" id="step2">
            <label>Enter the 6-digit OTP sent to your email</label>
            <div class="otp-inputs">
                <input type="text" maxlength="1" class="otp-box" id="o1" oninput="moveNext(this, 'o2')" />
                <input type="text" maxlength="1" class="otp-box" id="o2" oninput="moveNext(this, 'o3')" />
                <input type="text" maxlength="1" class="otp-box" id="o3" oninput="moveNext(this, 'o4')" />
                <input type="text" maxlength="1" class="otp-box" id="o4" oninput="moveNext(this, 'o5')" />
                <input type="text" maxlength="1" class="otp-box" id="o5" oninput="moveNext(this, 'o6')" />
                <input type="text" maxlength="1" class="otp-box" id="o6" />
            </div>
            <button onclick="verifyOTP()">Verify OTP</button>
            <p class="msg" id="msg2"></p>
            <p class="back" onclick="goBack()">← Change email</p>
        </div>
    </div>

    <script>
        function sendOTP() {
            const email = document.getElementById('email').value.trim();
            if (!email) { document.getElementById('msg1').textContent = 'Please enter your email.'; return; }
            document.getElementById('msg1').className = 'msg';
            document.getElementById('msg1').textContent = 'Sending OTP...';
            fetch('/send-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('step1').classList.remove('active');
                    document.getElementById('step2').classList.add('active');
                    document.getElementById('o1').focus();
                } else {
                    document.getElementById('msg1').className = 'msg error';
                    document.getElementById('msg1').textContent = data.message;
                }
            });
        }

        function moveNext(current, nextId) {
            if (current.value.length === 1) {
                document.getElementById(nextId).focus();
            }
        }

        function verifyOTP() {
            const otp = ['o1','o2','o3','o4','o5','o6'].map(id => document.getElementById(id).value).join('');
            const email = document.getElementById('email').value.trim();
            if (otp.length < 6) { document.getElementById('msg2').textContent = 'Please enter all 6 digits.'; return; }
            fetch('/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, otp })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    window.location.href = '/';
                } else {
                    document.getElementById('msg2').className = 'msg error';
                    document.getElementById('msg2').textContent = data.message;
                }
            });
        }

        function goBack() {
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step1').classList.add('active');
        }
    </script>
</body>
</html>
